<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIRCHI CAFE POS</title>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
  
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<style>


body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #F1F5F9;  /* 🔥 clean modern */
}

.item-icon {
  font-size: 22px;
  margin-bottom: 4px;
}
  
.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;

  padding: 10px 12px;
  background: #0F172A;
  color: white;
}



/* TODAY SALE */
.today-sale {
  background: #22C55E;
  padding: 6px 12px;
  border-radius: 10px;

  font-weight: 600;
  font-size: 14px;
}
  




/* TOTAL */
.total-amount {
  font-size: 22px;
  font-weight: 700;
  color: #0F172A;
}

.remove-btn {
  margin-left: 8px;
  border: none;
  background: #FECACA;   /* light pink */
  color: #DC2626;
  border-radius: 50%;    /* 🔥 circular */
  width: 22px;
  height: 22px;
  font-size: 12px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

  



.header-info {
  display: flex;
  justify-content: flex-end;
  padding: 0 12px 8px 12px;
}

.sales {
  background: rgba(0,0,0,0.1);
  padding: 6px 12px;
  border-radius: 10px;
  font-size: 14px;
}
  

  
/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  padding: 10px;
  align-items: center;
}

.logo-img {
  height: 35px;
}


.app-container {
  padding: 0 10px;   /* 🔥 SAME as bottom bar */
}
/* MAIN CARD */
.main-card {
  margin: 10px;
  border-radius: 20px;
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(12px);
  padding-bottom: 80px;
}

/* TABLES */
.tables {
  display: flex;
  border-radius: 16px;
  overflow: hidden;

  background: #e5e7eb;
}

.tables button {
  flex: 1;
  padding: 16px;

  border: none;
  background: transparent;

  font-weight: 600;
  font-size: 15px;

  transition: all 0.2s ease;
}

/* divider between buttons */
.tables button:not(:last-child) {
  border-right: 1px solid #cbd5f5;
}

/* ACTIVE TABLE */
.tables button.active {
  background: linear-gradient(135deg, #22C55E, #16A34A);
  color: white;

  transform: scale(1.05);
  box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
}

/* TAP EFFECT */
.tables button:active {
  transform: scale(0.95);
}

.brand {
  font-size: 20px;
  font-weight: 900;

  background: linear-gradient(135deg, #22C55E, #84CC16);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  letter-spacing: 1px;
}

  
/* CATEGORIES */
.categories {
  display: flex;
  overflow-x: auto;
  gap: 10px;
  padding: 10px;
  margin: 10px 0;
}

.categories button {
  padding: 10px 18px;
  border-radius: 999px;
  border: none;
  background: #E5E7EB;
}

.categories button.active {
  background: #374151;
  color: white;
}

/* ITEMS */
.items {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  padding: 8px;

  max-height: 30vh;   /* 🔥 LIMIT HEIGHT */
  overflow-y: auto;   /* 🔥 SCROLL */
}

.item {
  background: linear-gradient(145deg, #ffffff, #f1f5f9);
  border-radius: 14px;
  padding: 8px;

  text-align: center;

  box-shadow: 0 3px 8px rgba(0,0,0,0.05);

  transition: 0.2s ease;
}


/* TAP EFFECT */
.item:active {
  transform: scale(0.96);
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}
  
.main-card {
  background: rgba(255,255,255,0.6);  /* more transparent */
}
  
.item-name {
  font-weight: 600;
  font-size: 13px;
}

.item-price {
  font-size: 12px;
}
  
/* CART */
.cart-section {
  margin: 10px 0;
  border-radius: 18px;
  padding: 12px;

  background: linear-gradient(135deg, #ffffff, #f8fafc);
  box-shadow: 0 6px 20px rgba(0,0,0,0.08);

  border: 1px solid #e5e7eb;
}

  
/* HEADER */
.cart-title {
  font-weight: 700;
  font-size: 15px;

  display: flex;
  align-items: center;
  justify-content: space-between;

  margin-bottom: 10px;
  padding-bottom: 6px;

  border-bottom: 1px solid #e5e7eb;
}


/* subtle badge */
.cart-title::before {
  content: "🧾";
  margin-right: 6px;
}
  
/* ITEM ROW */
.cart-item {
  display: flex;
  justify-content: space-between;
  align-items: center;

  padding: 6px 0;
  font-size: 14px;
}

/* TOTAL */
.total-box {
  position: fixed;
  bottom: 10px;
  left: 10px;
  right: 10px;

  background: white;
  border-radius: 16px;

  padding: 10px;

  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

/* ROW LAYOUT */
.total-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.bill-wrapper {
  background: white;
  padding: 14px;
  border-radius: 12px;
  width: 90%;
  max-width: 320px;
}
  
.bill-btn {
  padding: 12px 18px;
  border-radius: 12px;
  border: none;

  font-size: 14px;
  font-weight: 600;

  background: linear-gradient(135deg, #22C55E, #4ADE80);
  color: white;

  box-shadow: 0 6px 14px rgba(34,197,94,0.4);

  position: relative;
  overflow: hidden;

  transition: 0.2s;
}


/* shine animation */
.bill-btn::after {
  content: "";
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;

  background: rgba(255,255,255,0.3);
  transform: skewX(-20deg);
}

/* hover / tap */
.bill-btn:active::after {
  left: 100%;
  transition: 0.4s;
}

  
/* PRESS EFFECT */
.bill-btn:active {
  transform: scale(0.96);
}


/* MODAL */
.bill-modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  background: rgba(0,0,0,0.6);

  display: none;
  justify-content: center;
  align-items: center;

  z-index: 9999;
}

/* BILL CARD */
.bill-content {
  background: white;
  padding: 16px;
  border-radius: 12px;
  width: 90%;
  max-width: 320px;
  font-family: monospace;
}

/* ACTIONS */
.bill-actions {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}

.bill-actions button {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 8px;

  background: #0F172A;
  color: white;

  font-size: 13px;
}



.summary-btn {
  background: rgba(255,255,255,0.15);
  border: none;
  color: white;

  width: 34px;
  height: 34px;

  border-radius: 10px;

  font-size: 16px;

  display: flex;
  align-items: center;
  justify-content: center;

  transition: 0.2s;
}

/* tap effect */
.summary-btn:active {
  transform: scale(0.9);
  background: rgba(255,255,255,0.25);
}
  
/* LOADER */
.loader {
  position: fixed;
  top: 0;              /* 🔥 IMPORTANT */
  left: 0;             /* 🔥 IMPORTANT */
  width: 100%;
  height: 100%;

  background: rgba(0,0,0,0.4);

  display: none;
  justify-content: center;
  align-items: center;

  z-index: 9999;       /* 🔥 ensure top layer */
}

.spinner {
  width: 45px;
  height: 45px;
  border: 4px solid #fff;
  border-top: 4px solid #22C55E;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}
/* POPUP */
.popup {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: white;
  padding: 14px 20px;
  border-radius: 12px;
  display: none;
  z-index: 9999;
  font-weight: 500;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="top-bar">
  <div class="brand">Mirchi Cafe</div>

  <div style="display:flex; align-items:center; gap:8px;">
    
    <button class="summary-btn" onclick="openSummary()">
      📊
    </button>

    <div class="today-sale">
      ₹ <span id="todaySale">0</span>
    </div>

  </div>
</div>

<!-- MAIN GLASS CARD -->
<div class="main-card">



  <div class="app-container">
  <!-- TABLES -->
  <div class="tables">
    <button onclick="selectTable(1,this)">T1</button>
    <button onclick="selectTable(2,this)">T2</button>
    <button onclick="selectTable(3,this)">T3</button>
  </div>

  <!-- CATEGORIES -->
  <div class="categories" id="categories"></div>

  <!-- ITEMS -->
  <div class="items" id="items"></div>

  <!-- CURRENT ORDER -->
  <div class="cart-section">
    <div class="cart-title">Current Order</div>
    <div id="cartItems"></div>
  </div>

</div>

<!-- TOTAL + BILL -->
<div class="total-box">
  <div class="total-row">
    <div class="total-amount">₹ <span id="total">0</span></div>

    <button class="bill-btn" onclick="generateBill()">
      Generate
    </button>
  </div>
</div>
</div>
<!-- LOADER -->
<div class="loader" id="loader">
  <div class="spinner"></div>
</div>



<div id="popup" class="popup"></div>
  

<div id="billModal" class="bill-modal">
  <div class="bill-wrapper">

    <div class="bill-content" id="billContent"></div>

    <div class="bill-actions">
      <button onclick="downloadBill()">Save</button>
      <button onclick="shareBill()">Share</button>
      <button onclick="closeBill()">Close</button>
    </div>

  </div>
</div>

<div id="summaryModal" class="bill-modal">
  <div class="bill-wrapper">

    <div id="summaryContent"></div>

    <div class="bill-actions">
      <button onclick="closeSummary()">Close</button>
    </div>

  </div>
</div>
  

  
<script src="script.js?v=2"></script>


  
</body>
</html>
