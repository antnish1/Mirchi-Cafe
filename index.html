<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FCV POS</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f2f2f2;
}

/* HEADER */
header {
  background: #000;
  color: white;
  padding: 12px;
  text-align: center;
}

/* TABLES */
.tables {
  display: flex;
}

.tables button {
  flex: 1;
  padding: 14px;
  border: none;
  background: #007bff;
  color: white;
}

.tables button.active {
  background: green;
}

/* CATEGORY */
.categories {
  display: flex;
  overflow-x: auto;
  background: white;
}

.categories button {
  padding: 10px;
  border: none;
  background: #eee;
  margin: 5px;
  border-radius: 20px;
}

/* ITEMS GRID */
.items {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  padding: 10px;
}

.item {
  background: white;
  padding: 12px;
  border-radius: 10px;
  text-align: center;
}

/* CART (BOTTOM FIXED) */
.cart {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  border-top: 1px solid #ccc;
  padding: 10px;
}

.total {
  font-weight: bold;
}

.bill-btn {
  width: 100%;
  padding: 15px;
  background: orange;
  border: none;
  color: white;
  border-radius: 10px;
  margin-top: 5px;
}
</style>
</head>

<body>

<header>FCV POS</header>

<div class="tables">
  <button onclick="selectTable(1, this)">T1</button>
  <button onclick="selectTable(2, this)">T2</button>
  <button onclick="selectTable(3, this)">T3</button>
</div>

<div class="categories" id="categories"></div>

<div class="items" id="items"></div>

<div class="cart">
  <div id="cartItems"></div>
  <div class="total">Total ₹<span id="total">0</span></div>
  <button class="bill-btn" onclick="generateBill()">Generate Bill</button>
</div>

<script src="script.js"></script>

</body>
</html>
