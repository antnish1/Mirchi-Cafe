<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIRCHI CAFE POS</title>

<style>


body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #F1F5F9;  /* 🔥 clean modern */
}


.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;

  padding: 10px 12px;
  background: #0F172A;
  color: white;
}



/* TODAY SALE */
.today-sale {
  background: #22C55E;
  padding: 6px 12px;
  border-radius: 10px;

  font-weight: 600;
  font-size: 14px;
}
  




/* TOTAL */
.total-amount {
  font-size: 24px;
  font-weight: 700;
  color: #0F172A;
}

.remove-btn {
  margin-left: 8px;
  border: none;
  background: #FECACA;   /* light pink */
  color: #DC2626;
  border-radius: 50%;    /* 🔥 circular */
  width: 22px;
  height: 22px;
  font-size: 12px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

  



.header-info {
  display: flex;
  justify-content: flex-end;
  padding: 0 12px 8px 12px;
}

.sales {
  background: rgba(0,0,0,0.1);
  padding: 6px 12px;
  border-radius: 10px;
  font-size: 14px;
}
  

  
/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  padding: 10px;
  align-items: center;
}

.logo-img {
  height: 35px;
}


.app-container {
  padding: 0 10px;   /* 🔥 SAME as bottom bar */
}
/* MAIN CARD */
.main-card {
  margin: 10px;
  border-radius: 20px;
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(12px);
  padding-bottom: 80px;
}

/* TABLES */
.tables {
  display: flex;
  margin: 10px;
  border-radius: 16px;
  overflow: hidden;
  margin: 10px 0;
}

.tables button {
  flex: 1;
  padding: 16px;
  border: none;
  background: #E5E7EB;
  font-weight: 600;
}

.tables button.active {
  background: linear-gradient(135deg, #22C55E, #16A34A);
  color: white;
}


.brand {
  font-size: 20px;
  font-weight: 900;

  background: linear-gradient(135deg, #22C55E, #84CC16);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  letter-spacing: 1px;
}

  
/* CATEGORIES */
.categories {
  display: flex;
  overflow-x: auto;
  gap: 10px;
  padding: 10px;
  margin: 10px 0;
}

.categories button {
  padding: 10px 18px;
  border-radius: 999px;
  border: none;
  background: #E5E7EB;
}

.categories button.active {
  background: #374151;
  color: white;
}

/* ITEMS */
.items {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  padding: 10px;
  margin: 10px 0;
}

.item {
  background: rgba(255,255,255,0.85);  /* 🔥 transparent */
  backdrop-filter: blur(6px);
  border-radius: 16px;
  padding: 10px;
  text-align: center;
}


.main-card {
  background: rgba(255,255,255,0.6);  /* more transparent */
}
  
.item-name {
  font-weight: 600;
}

.item-price {
  color: #6B7280;
}

/* CART */
.cart-section {
  margin: 10px 0;
  border-radius: 16px;
  background: white;
  padding: 12px;
}

.cart-title {
  font-weight: 600;
  margin-bottom: 10px;
}

.cart-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* TOTAL */
.total-box {
  position: fixed;
  bottom: 10px;
  left: 10px;
  right: 10px;

  background: white;
  border-radius: 16px;

  padding: 12px;

  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

.bill-btn {
  width: 100%;
  padding: 16px;

  border-radius: 14px;
  border: none;

  font-size: 16px;
  font-weight: 600;

  background: #0F172A;   /* 🔥 solid premium */
  color: white;

  box-shadow: 0 6px 16px rgba(0,0,0,0.2);
  transition: 0.2s;
}

/* PRESS EFFECT */
.bill-btn:active {
  transform: scale(0.97);
  background: #020617;
}

/* LOADER */
.loader {
  position: fixed;
  top: 0;              /* 🔥 IMPORTANT */
  left: 0;             /* 🔥 IMPORTANT */
  width: 100%;
  height: 100%;

  background: rgba(0,0,0,0.4);

  display: none;
  justify-content: center;
  align-items: center;

  z-index: 9999;       /* 🔥 ensure top layer */
}

.spinner {
  width: 45px;
  height: 45px;
  border: 4px solid #fff;
  border-top: 4px solid #22C55E;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}
/* POPUP */
.popup {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: white;
  padding: 14px 20px;
  border-radius: 12px;
  display: none;
  z-index: 9999;
  font-weight: 500;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="top-bar">
  <div class="brand">Mirchi Cafe</div>

  <div class="today-sale">
    ₹ <span id="todaySale">0</span>
  </div>
</div>

<!-- MAIN GLASS CARD -->
<div class="main-card">



  <div class="app-container">
  <!-- TABLES -->
  <div class="tables">
    <button onclick="selectTable(1,this)">T1</button>
    <button onclick="selectTable(2,this)">T2</button>
    <button onclick="selectTable(3,this)">T3</button>
  </div>

  <!-- CATEGORIES -->
  <div class="categories" id="categories"></div>

  <!-- ITEMS -->
  <div class="items" id="items"></div>

  <!-- CURRENT ORDER -->
  <div class="cart-section">
    <div class="cart-title">Current Order</div>
    <div id="cartItems"></div>
  </div>

</div>

<!-- TOTAL + BILL -->
<div class="total-box">
  <div class="total-amount">₹ <span id="total">0</span></div>
  <button class="bill-btn" onclick="generateBill()">Generate Bill</button>
</div>
</div>
<!-- LOADER -->
<div class="loader" id="loader">
  <div class="spinner"></div>
</div>



<div id="popup" class="popup"></div>
  
  
<script src="script.js"></script>


  
</body>
</html>
