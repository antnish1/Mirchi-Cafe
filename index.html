<!DOCTYPE html>
<html>
<head>
  <title>FCV POS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
body {
  font-family: Arial;
  background: #f2f2f2;
  margin: 0;
}

/* HEADER */
header {
  background: black;
  color: white;
  padding: 12px;
  text-align: center;
  font-size: 18px;
}

/* TABLE BUTTONS */
.tables {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  padding: 10px;
}

.tables button {
  padding: 16px;
  font-size: 16px;
  border-radius: 10px;
  border: none;
  background: #007bff;
  color: white;
}

/* ACTIVE TABLE */
.tables button.active {
  background: green;
}

/* MAIN */
.container {
  padding: 12px;
}

/* INPUTS */
select, input {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
  font-size: 16px;
}

/* BUTTON */
.add-btn {
  width: 100%;
  padding: 16px;
  margin-top: 10px;
  background: green;
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 16px;
}

/* CART */
.cart {
  margin-top: 12px;
  background: white;
  border-radius: 12px;
  padding: 10px;
  max-height: 250px;
  overflow-y: auto;
}

.cart-item {
  display: flex;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid #eee;
}

/* TOTAL */
.total {
  font-size: 20px;
  margin-top: 10px;
  font-weight: bold;
}

/* BILL BUTTON */
.bill-btn {
  width: 100%;
  padding: 18px;
  background: orange;
  color: white;
  border: none;
  border-radius: 12px;
  margin-top: 10px;
  font-size: 18px;
}

/* MOBILE TOUCH IMPROVEMENT */
button:active {
  transform: scale(0.97);
}
</style>
</head>

<body>

<header>FCV Café POS</header>

<div class="tables">
  <button onclick="selectTable(1, this)">Table 1</button>
  <button onclick="selectTable(2, this)">Table 2</button>
  <button onclick="selectTable(3, this)">Table 3</button>
</div>

<div class="container">

<h3 id="tableTitle">Select Table</h3>

<select id="item"></select>
<input type="number" id="qty" placeholder="Enter Quantity">

<button class="add-btn" onclick="addItem()">+ Add Item</button>

<div class="cart" id="cart"></div>

<div class="total">Total: ₹<span id="total">0</span></div>

<button class="bill-btn" onclick="generateBill()">Generate Bill</button>

</div>

<script src="script.js"></script>

</body>
</html>
