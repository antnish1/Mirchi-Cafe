<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIRCHI CAFE POS</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: url('logo.png') no-repeat center center fixed;
  background-size: cover;
}

/* BLUR OVERLAY */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(248,250,252,0.85);
  backdrop-filter: blur(8px);
  z-index: -1;
}

.total-box {
  z-index: 10;   /* 🔥 ensures clickable */
}

.header-banner {
  width: 100%;
  padding: 10px;
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(10px);
}

.total-amount {
  font-size: 26px;        /* 🔥 bigger */
  font-weight: 700;       /* 🔥 bold */
  color: #0F172A;
  margin-bottom: 6px;
}

.remove-btn {
  margin-left: 8px;
  border: none;
  background: #FECACA;   /* light pink */
  color: #DC2626;
  border-radius: 50%;    /* 🔥 circular */
  width: 22px;
  height: 22px;
  font-size: 12px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

  

.banner-logo {
  width: 100%;
  height: 80px;
  object-fit: contain;   /* 🔥 prevents distortion */
  border-radius: 12px;
}

.header-info {
  display: flex;
  justify-content: flex-end;
  padding: 0 12px 8px 12px;
}

.sales {
  background: rgba(0,0,0,0.1);
  padding: 6px 12px;
  border-radius: 10px;
  font-size: 14px;
}
  

  
/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  padding: 10px;
  align-items: center;
}

.logo-img {
  height: 35px;
}



/* MAIN CARD */
.main-card {
  margin: 10px;
  border-radius: 20px;
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(12px);
  padding-bottom: 80px;
}

/* TABLES */
.tables {
  display: flex;
  margin: 10px;
  border-radius: 16px;
  overflow: hidden;
}

.tables button {
  flex: 1;
  padding: 16px;
  border: none;
  background: #E5E7EB;
  font-weight: 600;
}

.tables button.active {
  background: linear-gradient(135deg, #22C55E, #16A34A);
  color: white;
}

/* CATEGORIES */
.categories {
  display: flex;
  overflow-x: auto;
  gap: 10px;
  padding: 10px;
}

.categories button {
  padding: 10px 18px;
  border-radius: 999px;
  border: none;
  background: #E5E7EB;
}

.categories button.active {
  background: #374151;
  color: white;
}

/* ITEMS */
.items {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  padding: 10px;
}

.item {
  background: rgba(255,255,255,0.85);  /* 🔥 transparent */
  backdrop-filter: blur(6px);
  border-radius: 16px;
  padding: 10px;
  text-align: center;
}


.main-card {
  background: rgba(255,255,255,0.6);  /* more transparent */
}
  
.item-name {
  font-weight: 600;
}

.item-price {
  color: #6B7280;
}

/* CART */
.cart-section {
  margin: 10px;
  border-radius: 16px;
  background: white;
  padding: 12px;
}

.cart-title {
  font-weight: 600;
  margin-bottom: 10px;
}

.cart-item {
  display: flex;
  justify-content: space-between;
  padding: 6px 0;
}

/* TOTAL */
.total-box {
  position: fixed;
  bottom: 10px;
  left: 10px;
  right: 10px;
  border-radius: 18px;
  background: white;
  padding: 12px;
}

.bill-btn {
  margin-top: 6px;
  padding: 16px;
  border-radius: 14px;
  border: none;
  width: 100%;
  background: linear-gradient(135deg, #22C55E, #84CC16);
  color: white;
}

/* LOADER */
.loader {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 9999;   /* 🔥 ADD THIS */
}

.spinner {
  width: 40px;
  height: 40px;
  border: 4px solid white;
  border-top: 4px solid #22C55E;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}
/* POPUP */
.popup {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: white;
  padding: 14px 20px;
  border-radius: 12px;
  display: none;
  z-index: 9999;
  font-weight: 500;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header-banner">
  <img src="logo.png" class="banner-logo">
</div>

<div class="header-info">
  <div class="sales">Today Sale ₹ <span id="todaySale">0</span></div>
</div>

<!-- MAIN GLASS CARD -->
<div class="main-card">

  <!-- TABLES -->
  <div class="tables">
    <button onclick="selectTable(1,this)">T1</button>
    <button onclick="selectTable(2,this)">T2</button>
    <button onclick="selectTable(3,this)">T3</button>
  </div>

  <!-- CATEGORIES -->
  <div class="categories" id="categories"></div>

  <!-- ITEMS -->
  <div class="items" id="items"></div>

  <!-- CURRENT ORDER -->
  <div class="cart-section">
    <div class="cart-title">Current Order</div>
    <div id="cartItems"></div>
  </div>

</div>

<!-- TOTAL + BILL -->
<div class="total-box">
  <div class="total-amount">₹ <span id="total">0</span></div>
  <button class="bill-btn" onclick="generateBill()">Generate Bill</button>
</div>

<!-- LOADER -->
<div class="loader" id="loader">
  <div class="spinner"></div>
</div>

<div>
  <span class="item-price">₹${c.amount}</span>
  <button onclick="removeItem(${index})" class="remove-btn">×</button>
</div>

<div id="popup" class="popup"></div>
  
  
<script src="script.js"></script>


  
</body>
</html>
